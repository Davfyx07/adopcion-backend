services:
  db:
    image: postgres:15
    container_name: adopcion-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: furmatch
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: adopcion-app
    depends_on:
      - db
    ports:
      - "3002:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/furmatch?schema=public
      SEED_PASSWORD: seedpassword
    command: sh -c "npx prisma db push --accept-data-loss && node prisma/seed.js && node src/index.js"

volumes:
  db_data:
